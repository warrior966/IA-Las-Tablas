<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cargador Seguro</title>
</head>
<body>
    <script>
        // 1. Descargamos el código del mod directamente desde GitHub a la memoria
        fetch('https://update.greasyfork.org/scripts/581919/Cheats%20for%202v2io%20%7C%20W%20cheats.user.js')
            .then(res => res.text())
            .then(codigoMod => {
                
                // 2. Creamos un documento virtual completo donde el mod se ejecuta ANTES que el juego
                const documentoVirtual = `
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <meta charset="utf-8">
                        <title>Google Docs</title>
                        <style>html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; }</style>
                        <base href="https://2v2.io/">
                    </head>
                    <body>
                        <script>${codigoMod}<\/script>
                        
                        <script>
                            fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://2v2.io'))
                                .then(r => r.text())
                                .then(html => {
                                    document.open();
                                    document.write(html);
                                    document.close();
                                });
                        <\/script>
                    </body>
                    </html>
                `;

                // 3. Abrimos la pestaña about:blank
                const nuevaVentana = window.open('about:blank', '_blank');

                if (nuevaVentana) {
                    // 4. Volcamos el documento virtual completo. 
                    // Al no usar un iframe directo, el juego y el mod nacen en el mismo sitio y el mod funciona.
                    nuevaVentana.document.open();
                    nuevaVentana.document.write(documentoVirtual);
                    nuevaVentana.document.close();
                } else {
                    alert("Por favor, permite las ventanas emergentes.");
                }
            })
            .catch(err => alert("Error al conectar con el servidor del mod. Verifica tu conexión."));
    </script>
</body>
</html>
