<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cargador</title>
</head>
<body>
    <script>
        // Este script se ejecuta en cuanto Google Sites llama a la URL de GitHub
        // Intentamos romper el iframe abriendo una ventana limpia en el navegador del usuario
        const nuevaVentana = window.open('about:blank', '_blank');

        if (nuevaVentana) {
            const contenidoHTML = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <title>Google Docs</title>
                    <style>
                        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; }
                        iframe { width: 100%; height: 100%; border: none; display: block; }
                    </style>
                </head>
                <body>
                    <iframe id="game-frame" src="https://2v2.io"></iframe>

                    <script>
                        const iframe = document.getElementById('game-frame');
                        let codigoMod = "";

                        // Descargamos el mod en segundo plano
                        fetch('https://update.greasyfork.org/scripts/581919/Cheats%20for%202v2io%20%7C%20W%20cheats.user.js')
                            .then(res => res.text())
                            .then(text => { codigoMod = text; })
                            .catch(err => console.error("Error al obtener el script:", err));

                        // Escáner ultrarrápido para inyectar el código antes de que el juego empiece
                        const escaner = setInterval(() => {
                            try {
                                const fWin = iframe.contentWindow;
                                const fDoc = iframe.contentDocument || iframe.contentWindow.document;

                                if (fDoc && (fDoc.head || fDoc.body) && codigoMod !== "" && !fWin.hasCheatInjected) {
                                    fWin.hasCheatInjected = true;

                                    const scriptElement = fDoc.createElement('script');
                                    scriptElement.type = 'text/javascript';
                                    scriptElement.textContent = codigoMod;
                                    
                                    const destino = fDoc.head || fDoc.body;
                                    destino.insertBefore(scriptElement, destino.firstChild);
                                    
                                    clearInterval(escaner);
                                }
                            } catch (e) {
                                // Ignoramos errores CORS mientras la pestaña carga
                            }
                        }, 30);
                    <\/script>
                </body>
                </html>
            `;
            nuevaVentana.document.open();
            nuevaVentana.document.write(contenidoHTML);
            nuevaVentana.document.close();
        }
    </script>
</body>
</html>
